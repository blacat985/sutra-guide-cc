sutraId: samyukta-agama
number: 621
volume: 24
volumeTitle: 雜阿含經卷第二十四
title: 第621經・四念處貫穿始終
gist: 佛陀教導阿難，四念處是貫穿佛教修行始終的核心法門，無論是初學的年輕比丘還是已獲解脫的阿羅漢，皆須精勤修習。
originalText: |
  如是我聞：

  一時，佛住舍衛國祇樹給孤獨園。時，尊者阿難與眾多比丘詣世尊所，稽首禮足，退坐一面。

  尊者阿難白佛言：「世尊！此諸年少比丘當云何教授？云何為其說法？」

  佛告阿難：「此諸年少比丘當以四念處教令修習。云何為四？謂身身觀念住，精勤方便，不放逸行，正智正念，寂定於心，乃至知身；受、心、法法觀念住，精勤方便，不放逸行，正念正智，寂靜於心，乃至知法。

  「所以者何？若比丘住學地者，未得進上，志求安隱涅槃時，身身觀念住，精勤方便，不放逸行，正念正智，寂靜於心；受、心、法法觀念住，精勤方便，不放逸行，正念正智，寂靜於心，乃至於法遠離。若阿羅漢諸漏已盡，所作已作，捨諸重擔，盡諸有結，正知善解脫，當於彼時亦修身身觀念住，精勤方便，不放逸行，正念正智，寂靜於心；受、心、法法觀念住，乃至於法得遠離。」

  時，尊者阿難歡喜隨喜，作禮而去。
detailedExplanation:
  - original: |
      如是我聞：
      
      一時，佛住舍衛國祇樹給孤獨園。時，尊者阿難與眾多比丘詣世尊所，稽首禮足，退坐一面。
      
      尊者阿難白佛言：「世尊！此諸年少比丘當云何教授？云何為其說法？」
    translation: |
      這是我親耳聽聞的：
      
      當時，佛陀在舍衛國的祇樹給孤獨園。尊者阿難與眾多比丘來到世尊的住處，向佛陀頂禮佛足後，退坐到一旁。
      
      尊者阿難向佛陀請教說：「世尊！對於這些初學的年輕比丘，我們應當如何教導他們？應該為他們宣說什麼樣的法要呢？」
  - original: |
      佛告阿難：「此諸年少比丘當以四念處教令修習。云何為四？謂身身觀念住，精勤方便，不放逸行，正智正念，寂定於心，乃至知身；受、心、法法觀念住，精勤方便，不放逸行，正念正智，寂靜於心，乃至知法。
    translation: |
      佛陀告訴阿難：「對於這些初學的年輕比丘，應當教導他們修習四念處。是哪四種呢？就是修習觀察身體的身念處，要精進勤奮地運用方法，不放逸地修行，保持正確的智慧與念住，讓內心寂靜安定，進而如實了知身體的實相；對於觀察感受的受念處、心念的心念處、諸法的法念處，同樣也要精進勤奮地運用方法，不放逸地修行，保持正確的念住與智慧，讓內心寂靜安定，進而如實了知諸法的實相。
  - original: |
      「所以者何？若比丘住學地者，未得進上，志求安隱涅槃時，身身觀念住，精勤方便，不放逸行，正念正智，寂靜於心；受、心、法法觀念住，精勤方便，不放逸行，正念正智，寂靜於心，乃至於法遠離。
    translation: |
      「為什麼呢？如果比丘還處於學習的階段，尚未達到最高的境界，立志追求安穩的涅槃解脫時，必須修習觀察身體的身念處，精進勤奮地運用方法，不放逸地修行，保持正確的念住與智慧，讓內心寂靜安定；也要修習觀察感受、心念、諸法的念處，精進勤奮地運用方法，不放逸地修行，保持正確的念住與智慧，讓內心寂靜安定，進而對一切現象產生遠離與不染著。
  - original: |
      「若阿羅漢諸漏已盡，所作已作，捨諸重擔，盡諸有結，正知善解脫，當於彼時亦修身身觀念住，精勤方便，不放逸行，正念正智，寂靜於心；受、心、法法觀念住，乃至於法得遠離。」
      
      時，尊者阿難歡喜隨喜，作禮而去。
    translation: |
      「如果已經是斷盡一切煩惱的阿羅漢，應做的事皆已完成，放下了所有重擔，斷除了所有生死結縛，以正確的智慧獲得徹底解脫，此時他們依然在修習觀察身體的身念處，精進勤奮地運用方法，不放逸地修行，保持正確的念住與智慧，讓內心寂靜安定；也同樣修習觀察感受、心念、諸法的念處，進而對一切現象保持遠離與清淨。」
      
      當時，尊者阿難聽聞佛陀的教導後，心生歡喜並隨喜讚歎，向佛陀頂禮後離去。
