volumeTitle: 雜阿含經卷第二十四
title: 第620經・安住四念免五縛
gist: 透過愚癡猿猴被黏膠困住全身的寓言，警告修行者若攀緣五欲境界，便會落入魔網，應當安住於四念處的自界。
originalText: |
  如是我聞：

  一時，佛住王舍城迦蘭陀竹園。

  爾時，世尊告諸比丘：「大雪山中，寒氷嶮處，尚無猨猴，況復有人。或復有山，猨猴所居，而無有人。或復有山，人獸共居，於猨猴行處，獵師以黐膠塗其草上，有黠猨猴遠避而去，愚癡猨猴不能遠避，以手小觸，即膠其手；復以二手欲解求脫，即膠二手；以足求解，復膠其足；以口嚙草，輒復膠口。五處同膠，聯捲臥地。獵師既至，即以杖貫，擔負而去。

  「比丘當知，愚癡猨猴捨自境界父母居處，遊他境界，致斯苦惱。如是，比丘！愚癡凡夫依聚落住，晨朝著衣持鉢，入村乞食，不善護身，不守根門，眼見色已，則生染著；耳聲、鼻香、舌味、身觸，皆生染著。愚癡比丘內根外境被五縛已，隨魔所欲。是故，比丘！當如是學，於自所行處父母境界依止而住，莫隨他處他境界行。云何比丘自所行處父母境界？謂四念處——身身觀念住，受、心、法法觀念住。」

  佛說此經已，諸比丘聞佛所說，歡喜奉行。
detailedExplanation:
  - original: |
      如是我聞：
      
      一時，佛住王舍城迦蘭陀竹園。
      
      爾時，世尊告諸比丘：「大雪山中，寒氷嶮處，尚無猨猴，況復有人。或復有山，猨猴所居，而無有人。或復有山，人獸共居，於猨猴行處，獵師以黐膠塗其草上，有黠猨猴遠避而去，愚癡猨猴不能遠避，以手小觸，即膠其手；復以二手欲解求脫，即膠二手；以足求解，復膠其足；以口嚙草，輒復膠口。五處同膠，聯捲臥地。獵師既至，即以杖貫，擔負而去。
    translation: |
      這是我親耳聽聞的：
      
      當時，佛陀在王舍城的迦蘭陀竹園。
      
      世尊告訴比丘們：在大雪山裡，氣候寒冷結冰的險峻之處，連猿猴都沒有，更何況是人。有些山區則是猿猴的棲息地，但沒有人類。又有些山區是人與野獸共同居住的，在猿猴出沒的地方，獵人會把黏膠塗在草上。聰明的猿猴看到就會遠遠避開；而愚癡的猿猴不懂得遠離，用手輕輕一碰，手就被黏住了；接著想用兩隻手去解脫，兩隻手就都被黏住了；又想用腳去幫忙解開，腳也被黏住了；最後用嘴去咬草，連嘴巴也被黏住了。身體這五個部位同時被黏住，整個身體蜷縮倒在地上。獵人到了之後，就用棍子將牠穿透，扛在肩上帶走。
  - original: |
      「比丘當知，愚癡猨猴捨自境界父母居處，遊他境界，致斯苦惱。如是，比丘！愚癡凡夫依聚落住，晨朝著衣持鉢，入村乞食，不善護身，不守根門，眼見色已，則生染著；耳聲、鼻香、舌味、身觸，皆生染著。愚癡比丘內根外境被五縛已，隨魔所欲。
    translation: |
      比丘們應當知道，愚癡的猿猴捨棄了自己熟悉的父母領域，遊蕩到危險的領域，才導致這樣的苦惱。同樣的道理，比丘們！愚癡的凡夫住在村落附近，早晨穿好袈裟、拿著缽進入村子裡乞食，如果不懂得善加保護自己，沒有守護好感官的門戶，眼睛看到形色後，就產生了染著；耳朵聽到聲音、鼻子聞到氣味、舌頭嚐到味道、身體感受到觸覺，也全都產生了染著。愚癡的比丘內在感官與外在環境就這樣被這五種繩索綁住，任由魔王隨心所欲地擺布。
  - original: |
      「是故，比丘！當如是學，於自所行處父母境界依止而住，莫隨他處他境界行。云何比丘自所行處父母境界？謂四念處——身身觀念住，受、心、法法觀念住。」
      
      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      因此，比丘們！你們應當這樣學習，在自己修行處所的父母領域中安穩居住，不要跟隨其他地方與其他領域去行動。什麼是比丘自己處所的父母領域呢？就是四念處，也就是觀察身體的身念處，以及觀察感受的受念處、觀察心念的心念處、觀察諸法的法念處。
      
      佛陀說完這部經後，比丘們聽聞佛陀的教導，都歡喜地遵照奉行。
