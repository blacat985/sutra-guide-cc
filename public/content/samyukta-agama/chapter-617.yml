sutraId: samyukta-agama
number: 617
volume: 24
volumeTitle: 雜阿含經卷第二十四
title: 第617經・安住自界四念處
gist: 透過羅婆鳥與老鷹的寓言，說明修行者應安住於四念處的自界，遠離五欲的他界，方能免遭魔難。
originalText: |
  如是我聞：

  一時，佛住舍衛國祇樹給孤獨園。

  爾時，世尊告諸比丘：「過去世時有一鳥，名曰羅婆，為鷹所捉，飛騰虛空，於空鳴喚言：『我不自覺，忽遭此難，我坐捨離父母境界而遊他處，故遭此難。如何今日為他所困，不得自在。』鷹語羅婆：『汝當何處自有境界而得自在？』羅婆答言：『我於田耕壠中自有境界，足免諸難，是為我家父母境界。』

  「鷹於羅婆起憍慢言：『放汝令去，還耕壠中，能得脫以不？』於是羅婆得脫鷹爪，還到耕壠大塊之下，安住止處，然後於塊上欲與鷹鬪。

  「鷹則大怒，彼是小鳥，敢與我鬪，瞋恚極盛，駿飛直搏，於是羅婆入於塊下，鷹鳥飛勢，臆衝堅塊，碎身即死。

  「時，羅婆鳥深伏塊下，仰說偈言：

  「『鷹鳥用力來，羅婆依自界，乘瞋猛盛力，致禍碎其身。
  我具足通達，依於自境界，伏怨心隨喜，自觀欣其力。
  設汝有兇愚，百千龍象力，不如我智慧，十六分之一。
  觀我智殊勝，摧滅於蒼鷹。』

  「如是，比丘！如彼鷹鳥，愚癡自捨所親父母境界，遊於他處，致斯災患。汝等比丘亦應如是，於自境界所行之處，應善守持，離他境界，應當學。

  「比丘！他處他境界者，謂五欲境界，眼見可意、受、念妙色，欲心染著；耳識聲、鼻識香、舌識味、身識觸，可意、受、念妙觸，欲心染著。是名比丘他處他境界。比丘！自處父母境界者，謂四念處。云何為四？謂身身觀念處，受、心、法法觀念處。是故，比丘！於自行處父母境界而自遊行，遠離他處他境界，應當學。」

  佛說此經已，諸比丘聞佛所說，歡喜奉行。
detailedExplanation:
  - original: |
      如是我聞：
      
      一時，佛住舍衛國祇樹給孤獨園。
      
      爾時，世尊告諸比丘：「過去世時有一鳥，名曰羅婆，為鷹所捉，飛騰虛空，於空鳴喚言：『我不自覺，忽遭此難，我坐捨離父母境界而遊他處，故遭此難。如何今日為他所困，不得自在。』鷹語羅婆：『汝當何處自有境界而得自在？』羅婆答言：『我於田耕壠中自有境界，足免諸難，是為我家父母境界。』
    translation: |
      這是我親耳聽聞的：
      
      當時，佛陀在舍衛國的祇樹給孤獨園。
      
      那時，世尊告訴比丘們：過去世時有一隻名叫羅婆的小鳥，被老鷹捉住了。老鷹帶著牠飛在空中，羅婆鳥在空中哀鳴說：「我沒有自覺，忽然遭遇這場災難。我因為離開了父母傳承的領域，遊蕩到其他地方，所以才遭遇這個危險。現在我被他人困住，失去了自由。」老鷹對羅婆鳥說：「你到底在哪裡才有自己的領域而能獲得自由呢？」羅婆鳥回答說：「我在農田的犁溝中，有自己的領域，足以免除各種災難，那就是我父母傳承下來的家園領域。」
  - original: |
      「鷹於羅婆起憍慢言：『放汝令去，還耕壠中，能得脫以不？』於是羅婆得脫鷹爪，還到耕壠大塊之下，安住止處，然後於塊上欲與鷹鬪。
      
      「鷹則大怒，彼是小鳥，敢與我鬪，瞋恚極盛，駿飛直搏，於是羅婆入於塊下，鷹鳥飛勢，臆衝堅塊，碎身即死。
    translation: |
      老鷹對羅婆鳥生起驕傲輕慢的心，說：「我現在放你走，讓你回到犁溝中，你能逃脫得了嗎？」於是羅婆鳥脫離了老鷹的爪子，回到田地的犁溝中，躲在一塊大土塊下面，安穩地待在那個地方，然後在土塊上準備與老鷹搏鬥。
      
      老鷹非常憤怒，心想那只是一隻小鳥，竟敢跟我搏鬥。老鷹怒氣沖天，急速俯衝直撲而下。這時羅婆鳥立刻躲進土塊下方，老鷹飛行的猛烈衝力，讓胸膛直接撞擊在堅硬的土塊上，當場粉身碎骨而死。
  - original: |
      「時，羅婆鳥深伏塊下，仰說偈言：
      
      「『鷹鳥用力來，羅婆依自界，乘瞋猛盛力，致禍碎其身。
      我具足通達，依於自境界，伏怨心隨喜，自觀欣其力。
      設汝有兇愚，百千龍象力，不如我智慧，十六分之一。
      觀我智殊勝，摧滅於蒼鷹。』
    translation: |
      當時，羅婆鳥深深地躲在土塊下面，仰起頭來唱誦出這段偈語：
      
      老鷹帶著猛力撲來，我羅婆鳥依憑著自己的領域。老鷹乘著強烈的憤怒與衝力，結果招致災禍而粉身碎骨。
      我完全通達道理，依憑著自己的領域。降伏了怨敵心生歡喜，觀察自己的力量而感到欣慰。
      假設你有凶狠愚痴，以及成百上千頭大象般的神力，也不如我智慧的十六分之一。
      看我憑藉殊勝的智慧，就摧毀了凶猛的蒼鷹。
  - original: |
      「如是，比丘！如彼鷹鳥，愚癡自捨所親父母境界，遊於他處，致斯災患。汝等比丘亦應如是，於自境界所行之處，應善守持，離他境界，應當學。
    translation: |
      就像這樣，比丘們！如同那隻羅婆鳥，因為愚痴而自己捨棄了親近的父母領域，遊蕩到其他地方，才招致這樣的災患。你們比丘也應該如此，對於自己領域的修行處所，應該善加守護維持，遠離其他不屬於自己的領域，這是你們應當學習的。
  - original: |
      「比丘！他處他境界者，謂五欲境界，眼見可意、受、念妙色，欲心染著；耳識聲、鼻識香、舌識味、身識觸，可意、受、念妙觸，欲心染著。是名比丘他處他境界。
      
      比丘！自處父母境界者，謂四念處。云何為四？謂身身觀念處，受、心、法法觀念處。是故，比丘！於自行處父母境界而自遊行，遠離他處他境界，應當學。」
      
      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      比丘們！所謂其他地方、其他領域，就是指五種感官欲望的領域。眼睛看見令人愉悅、感受美好、心生惦念的形色，欲望之心便產生染著；耳朵辨識聲音、鼻子辨識氣味、舌頭辨識味道、身體辨識觸覺，遇到令人愉悅、感受美好、心生惦念的接觸，欲望之心便產生染著。這就稱為比丘的其他地方、其他領域。
      
      比丘們！所謂自己處所的父母領域，就是指四念處。是哪四種呢？就是觀察身體的身念處，以及觀察感受的受念處、觀察心念的心念處、觀察諸法的法念處。因此，比丘們！要在自己修行處所的父母領域中自在遊行，遠離其他地方與其他領域，你們應當這樣學習。
      
      佛陀說完這部經後，比丘們聽聞佛陀的教導，都歡喜地遵照奉行。
