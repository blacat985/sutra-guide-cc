audioTitle: 雜阿含經617-621：奪回內心主場（音頻導讀）

transcript: |
  ### 一、建立內心防護網：小鵪鶉與老鷹的寓言

  「嘿，歡迎你來到今天的深度探索。在這個充滿誘惑，每個人都超容易有資訊焦慮的時代，我們今天要帶你翻開古老的《雜阿含經》。」

  沒錯，來進行一場心靈的深度潛水。

  「對，我們的任務其實很明確，就是要為你解密到底要怎麼建立起一套強大的內心防護網。」

  而且我們今天準備了《雜阿含經》裡面的幾幅古代寓言畫面。這些故事雖然古老，但其實能精準地教你怎麼不被外界綁架。

  「把生活的主場優勢找回來，對吧？」

  完全正確。那我們先直接進入第一個故事。想像一下這個畫面：有一隻叫羅婆鳥的小鵪鶉，差點變成老鷹的午餐。

  「差一點就被吃掉了。」

  真的，但幸運的是牠逃脫了，立刻躲回農田裡一塊很硬的大土塊下面。那隻驕傲的老鷹覺得自己被挑釁，被激怒之後就急速俯衝。

  「想要直接抓住那隻小鳥。」

  結果老鷹直接撞上堅硬的土塊，當場粉身碎骨。這個故事其實很有意思。那隻來勢洶洶的老鷹，其實就是在象徵我們盲目追求的五欲。

  「五欲是指？」

  就是視覺、聽覺等各種感官上的誘惑。而小鵪鶉安住的堅固土塊，就是修行者的安全區。經文裡面稱這個為「四念處」。

  「等一下，躲在土塊下面聽起來不是有點像在逃避現實嗎？」

  很多人會這樣想。

  「對啊，這難道不是一種消極的鴕鳥心態嗎？」

  這是個很好的問題。這其實不是逃避，而是主動的覺察。四念處聽起來好像很玄妙，但如果用現代心理學的角度來看，它其實是一套超級強大的生物回饋系統。

  「怎麼說？」

  它要求你把注意力拉回來，單純去觀察自己的身體感受和情緒觸發點。當你把心安住在當下的覺察中，不去跟焦慮硬碰硬，煩惱自然會因為找不到施力點就散掉了。

  「哦！所以面對像老鷹那樣猛烈的攻擊，我們要以巧力安住。」

  沒錯。但如果今天這個誘惑不是直接攻擊你，而是靜靜待在那邊，看起來好像沒什麼殺傷力呢？那你可能就會掉進經文裡的另一個陷阱了。

  ### 二、貪念的黏膠效應：喜馬拉雅山上的猿猴

  「什麼陷阱？」

  就是在喜馬拉雅山上，有一隻很貪吃的猿猴。獵人在草叢裡塗滿了黏膠，這隻猿猴因為好奇就伸出一隻手去碰了一下。

  「結果就被黏住了對不對？」

  對，結果為了掙脫，牠急忙伸出另一隻手，也被黏住。接著用雙腳去踢，最後連嘴巴都咬了上去。

  「天啊，全身都被黏住了。」

  沒錯，五個地方全被死死黏住，最後就淪為獵人的獵物了。

  「這個畫面感真的太強了！這簡直就是我們現代人的日常寫照啊。像我們常常對自己說，我只滑五分鐘手機就好。」

  結果兩個小時就過去了。

  「真的是這樣。你的手、眼睛、大腦全部被螢幕死死黏住，徹底失去了時間跟自由。」

  這就是為什麼，一旦你離開了剛才說的覺察安全區，放任感官去追逐外在刺激，哪怕一開始只是一個很小的貪念，都會產生可怕的黏膠效應。

  「就像滾雪球一樣，越陷越深。」

  完全沒錯。

  ### 三、覺察的雙贏智慧：照顧自己即是保護他人

  「聽起來維持覺察真的很重要。不過，如果我們一直專注在照顧自己的覺察上，會不會讓人家覺得有點自私啊？或者說，這對我們身邊的人到底有什麼好處？」

  關於這一點，《雜阿含經》裡有一段長竹竿特技表演師徒的對話，我覺得完美解答了這個疑惑。

  「哦對，那個故事也很有意思。師父跟徒弟說，我們在表演這種高難度特技的時候，應該互相保護，這樣才安全嘛。」

  但徒弟的回答很不一樣。

  「對，徒弟居然反駁師父。他說不對，我們應該各自照顧好自己，這樣我們兩個人才能雙雙安全落地。」

  徒弟的這句話其實點出了極高的智慧。當你持續練習覺察，維持穩定的情緒和身心狀態時，你就不會把壓力發洩在別人身上。

  「就不會波及無辜了。」

  沒錯，這本身就是對他人最好的保護。當你以不傷害的心對待周遭，這種善意也會形成一個正向迴圈。

  「最後反過來保護你自己。」

  就是這樣。經文進一步強調，這種狀態不只是初學者的防護罩喔。

  「連開悟智者也是這樣嗎？」

  對，即使是徹底解脫煩惱的阿羅漢，他們依然把這種覺察當作一生的生活實踐。

  「原來照顧好我自己，其實就是在照顧你。也就是說，覺察不是一種手段，而是生命最安穩的狀態。」

  沒錯。建立這種內心的主場優勢，隨時都可以開始。仔細想想，你每天其實都在面對生活中的老鷹和黏膠。與其向外盲目地對抗那些消耗你的事物，不如向內安住，建立起專屬於你的安全堡壘。

  「真的是這樣。所以在今天結束之前，當你又想漫無目的地滑手機，或準備對親友發脾氣的時候，試著停下來問問自己：我現在是安穩地站在自己的主場上，還是正把手伸向那塊危險的黏膠呢？」