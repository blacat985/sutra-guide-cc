volumeTitle: 雜阿含經卷第二十四
title: 第624-626經・淨初業修四念處
gist: 佛陀教導修行者必須先清淨戒律、端正見解，以此為基礎修習四念處，方能超越魔障與生死輪迴。
originalText: |
  （六二四）
  如是我聞：
  一時，佛住舍衛國祇樹給孤獨園。

  爾時，尊者欝低迦來詣佛所，稽首佛足，退坐一面，白佛言：「善哉！世尊！為我說法，我聞法已，當獨一靜處，專精思惟，不放逸住，思惟：『所以善男子剃除鬚髮，正信非家，出家學道……。』」如上廣說，乃至「『不受後有。』」

  佛告欝低迦：「如是，如是，如汝所說。但於我所說法，不悅我心，彼所事業亦不成就，雖隨我後，而不得利，反生障閡。」
  欝低迦白佛：「世尊所說，我則能令世尊心悅，自業成就，不生障閡。唯願世尊為我說法，我當獨一靜處，專精思惟，不放逸住……」如上廣說，乃至「不受後有。」如是第二、第三請。

  爾時，世尊告欝低迦：「汝當先淨其初業，然後修習梵行。」
  欝低迦白佛：「我今云何淨其初業，修習梵行？」
  佛告欝低迦：「汝當先淨其戒，直其見，具足三業，然後修四念處。何等為四？內身身觀念住，專精方便，正智正念，調伏世間貪憂。如是外身、內外身身觀念住，受、心、法法觀念住……」亦如是廣說。

  時，欝低迦聞佛所說，歡喜隨喜，從座起而去。
  時，欝低迦聞佛教授已，獨一靜處，專精思惟，不放逸住，思惟：「所以善男子剃除鬚髮，著袈裟衣，正信非家，出家學道，乃至不受後有。」

  如欝低迦所問，如是異比丘所問亦如上說。

  （六二五）
  如是我聞：
  一時，佛住舍衛國祇樹給孤獨園。

  時，有異比丘名婆醯迦，來詣佛所，稽首禮足，退坐一面，白佛言：「世尊！善哉世尊！為我說法……」如前欝低迦修多羅廣說。差別者：「如是，婆醯迦比丘！初業清淨，身身觀念住者，超越諸魔；受、心、法法觀念住者，超越諸魔。」

  時，婆醯迦比丘聞佛說法教誡已，歡喜隨喜，作禮而去。獨一靜處，專精思惟，不放逸住，乃至不受後有。

  （六二六）
  第二經亦如上說。差別者：「如是，比丘！超越生死。」
detailedExplanation:
  - original: |
      爾時，尊者欝低迦來詣佛所，稽首佛足，退坐一面，白佛言：「善哉！世尊！為我說法，我聞法已，當獨一靜處，專精思惟，不放逸住，思惟：『所以善男子剃除鬚髮，正信非家，出家學道……。』」如上廣說，乃至「『不受後有。』」
      佛告欝低迦：「如是，如是，如汝所說。但於我所說法，不悅我心，彼所事業亦不成就，雖隨我後，而不得利，反生障閡。」
      欝低迦白佛：「世尊所說，我則能令世尊心悅，自業成就，不生障閡。唯願世尊為我說法，我當獨一靜處，專精思惟，不放逸住……」如上廣說，乃至「不受後有。」如是第二、第三請。
    translation: |
      那時，欝低迦尊者來到佛陀面前，頂禮佛足後坐在一旁，向佛陀請求說：「太好了！世尊！請您為我說法。我聽法之後，會獨自在安靜的地方專心思考，毫不懈怠地修行，直到證得不再受生死輪迴的解脫境界。」
      佛陀告訴他：「確實如你所說，這是修行的目標。但如果對於我所教導的法不能生起歡喜信受之心，那麼修行的事業就不會成就；即使跟隨在我身後，也得不到真正的利益，反而會產生重重障礙。」
      欝低迦再次懇求：「世尊所教導的，我一定能做到令您滿意，讓道業成就而不生障礙。請世尊為我說法，我必定獨自精進修行。」他如此懇切地請求了三次。
  - original: |
      爾時，世尊告欝低迦：「汝當先淨其初業，然後修習梵行。」
      欝低迦白佛：「我今云何淨其初業，修習梵行？」
      佛告欝低迦：「汝當先淨其戒，直其見，具足三業，然後修四念處。何等為四？內身身觀念住，專精方便，正智正念，調伏世間貪憂。如是外身、內外身身觀念住，受、心、法法觀念住……」亦如是廣說。
    translation: |
      這時世尊告訴欝低迦：「你應當先清淨最初的基石，然後才能修習清淨的梵行。」
      欝低迦問：「我該如何清淨最初的基石來修行呢？」
      佛陀回答：「你應當先清淨自己的戒律，端正自己的見解，讓身體行為、言語以及內心動機都具足清淨。具備了這些基礎後，再修習四念處：專注精勤地觀察身體，以正智與正念調伏世間的貪心與憂愁；對於感受、心念、法，也都如此精勤觀察。」
  - original: |
      時，欝低迦聞佛所說，歡喜隨喜，從座起而去。
      時，欝低迦聞佛教授已，獨一靜處，專精思惟，不放逸住，思惟：「所以善男子剃除鬚髮，著袈裟衣，正信非家，出家學道，乃至不受後有。」
      如欝低迦所問，如是異比丘所問亦如上說。
    translation: |
      欝低迦聽完佛陀的教導，滿心歡喜，向佛陀作禮後離開。隨後，他獨自在幽靜之處精進思惟，毫不放逸地實踐，最終證悟了出家的真諦，達到了不再受生於輪迴的解脫境界。
      其他有類似疑問的比丘來請問佛陀，佛陀也是如此回答。
  - original: |
      時，有異比丘名婆醯迦，來詣佛所，稽首禮足，退坐一面，白佛言：「世尊！善哉世尊！為我說法……」如前欝低迦修多羅廣說。差別者：「如是，婆醯迦比丘！初業清淨，身身觀念住者，超越諸魔；受、心、法法觀念住者，超越諸魔。」
      時，婆醯迦比丘聞佛說法教誡已，歡喜隨喜，作禮而去。獨一靜處，專精思惟，不放逸住，乃至不受後有。
    translation: |
      那時，有一位名叫婆醯迦的比丘也來向佛陀請法，佛陀的教導與之前對欝低迦所說的完全相同。其中的差別在於，佛陀特別強調：「婆醯迦比丘！如果基礎清淨，並且能安住於觀察身體、感受、心念與萬法，就能夠超越各種魔軍的干擾。」
      婆醯迦比丘聽聞教導後歡喜離去，獨自精進修行，最終也證得了不再受生的解脫境界。
  - original: |
      第二經亦如上說。差別者：「如是，比丘！超越生死。」
    translation: |
      接下來的一經（第626經）內容也與上述相同。其中的差別在於，佛陀強調的是：「比丘啊！如果能基礎清淨並安住於四念處，就能夠徹底超越生死的輪迴。」
