    translation: |
      這是我親耳聽聞的：

      當時，佛陀住在巴連弗邑的鷄林精舍。

      那時，世尊告訴比丘們：「如果比丘對於四念處能常常修習，這就稱為聖者的出離之道。是哪四個呢？也就是向內觀察身體、感受、心念以及一切現象，並將心念安住於其中。」

      佛陀解說完這部經後，比丘們聽聞佛陀的教導，都充滿歡喜，並遵照著去實行。

      如同宣說能得聖者出離一樣，佛陀也以此句型廣泛解說了勤修四念處能真正滅盡痛苦、達到苦的究竟盡頭、獲得大果報、獲得大福利、獲得不死甘露之法、究竟體證甘露，以及親證甘露法，就如同前面詳細解說的一樣。
