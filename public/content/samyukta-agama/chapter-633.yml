    translation: |
      這是我親耳聽聞的：

      當時，佛陀住在巴連弗邑的鷄林精舍。

      那時，世尊告訴比丘們：「如果提到所謂的一切法，這一切法指的就是四念處，這樣才叫做正確的說法。是哪四個呢？也就是向內觀察身體、感受、心念以及一切現象，並將心念安住於其中。」

      佛陀解說完這部經後，比丘們聽聞佛陀的教導，都充滿歡喜，並遵照著去實行。
