transcript: |
  ### 一、面對誘惑的反直覺智慧

  「歡迎大家加入今天的這場深度對談。你知道嗎？通常我們腦海裡想到『誘惑』這兩個字的時候，浮現的可能都是某個具象的魔鬼，或者是某種極端的感官刺激。」

  沒錯，大家很直覺都會往那個方向去想。

  「但今天我們要直接走進《雜阿含經》裡面，去看看兩千多年前的智慧。這經文裡面，有一個蠻震撼的畫面。」

  哦，你說的是哪一段故事？

  「就是當時有一位絕頂美麗、又富甲一方的名妓，叫做菴羅女，她正盛裝打扮走向佛陀與整個僧團。大家想想看，一群修行人面對這種級別的誘惑，正常的反應應該是趕快轉頭不看，或者是趕緊閃避吧。」

  其實不然，佛陀當時並沒有要弟子們閉上眼睛或是逃走。

  ### 二、日常中的深層誘惑與習氣

  「哇，這點真的超反直覺的，不逃走要怎麼辦？」

  佛陀反而是提醒他們，要收攝心念，安住於正念之中。這其實點出了一個很核心的真相：我們生活中遇到最大的誘惑，往往不是外在那些看得見的帥哥美女，或者是實質的金銀財寶。

  「那不然是什麼？」

  其實就是在日常的人際互動裡，我們內心對於名譽、地位、面子，還有利益的那種深層貪求。

  「等等，面子跟利益？這聽起來有道理，但在現實生活中要實際操作也太難了吧。」

  說真的，非常難。

  「對，假設今天在深山裡打坐，我可能可以好好收攝心念。但在職場上，比如在會議中突然被同事當眾質疑，甚至搶了我的功勞，那一瞬間為了一爭一口氣，要顧及面子，心裡的火肯定是一下子就冒上來了。」

  沒錯，那時候理智根本就不管用了。

  「就是直接反唇相譏了！煞車絕對是失靈的。」

  ### 三、四正勤：截斷習氣的煞車機制

  所以這就是為什麼《雜阿含經》會特別強調觀照自己起心動念的重要性。當同事激怒你的時候，如果你缺乏覺察，就會盲目地順著自己的習氣去反應。

  「習氣也就是我們長久以來的慣性，對吧？」

  對，你縱容了內心的不甘心與瞋恨，最後的結果就是，就算當下吵贏了、爭到了面子，卻破壞了彼此的關係，造下了惡業。

  「確實。而且如果沒吵贏就更嘔了，整個人深陷在痛苦與憤怒裡面。」

  沒錯，所以經文裡教導的「四正勤」，其實就像是一套心理上的煞車機制，用來主動截斷這種慣性。
  「那這個四正勤具體來說，在當下要怎麼運作？」

  簡單來說，就是在惡念剛冒出一個小火花，還沒有變成你脫口而出的惡言之前，你就先察覺它了。

  「哦，也就是抓到自己正在生氣。」

  對，你意識到「我現在因為面子受損而生氣了」。當你看見這個情緒，它就不會立刻綁架你的行為，等於踩下了煞車，不讓這個負面的火苗變成傷人的舉動。

  ### 四、持滿油鉢：四念處的極致專注

  「也就是說，要在情緒的火苗變成森林大火之前，就把它給踩熄。但這需要極度敏銳的專注力吧？」

  非常需要。在吵架的當下還要保持這種清明，簡直就像在走鋼索一樣。這讓我想到經文中為了形容這種專注力，用了一個非常震撼的「持滿油鉢」的比喻。

  「這個比喻非常經典。」

  我來跟大家分享這個畫面。想像一下，你端著滿滿一鉢的油，要走過一個超級喧鬧、充滿音樂與人群的市集。最可怕的是，你的身後緊緊跟著一個拔出大刀的劊子手。只要你一分心，滴出一滴油……

  「哇，他立刻就會砍下你的頭。這壓力也太大了吧！」

  這個充滿生死危機感的畫面，其實就是在精準描繪我們修習「四念處」該有的極致專注。
  「四念處就是專注在當下，對嗎？」

  沒錯，就是把注意力完全錨定在當下的身心狀態。如果你端著那鉢油，你的心力絕對不可能被旁邊的喧鬧牽著走。經文要傳達的是，如果我們把每一次的心念失控、對名利的貪求，都看作是嚴重喪失自己清淨生命的危機……

  「那我們就不會那麼輕易地放縱慣性了。」

  完全正確。

  ### 五、人成即佛成：端穩心念的基礎

  「可是說真的，要求一個普通人在日常的家庭紛爭或者是職場鬥爭中，隨時端著這鉢油不灑出來，標準是不是有點太高了？有時候我們連跟家人好好說話、不亂發脾氣都做不到啊。」

  講到這裡，這就是經文裡最一針見血的地方。在後續關於「敬起初業」的段落裡面，經文其實傳遞了一個非常直白，甚至有點殘酷的現實。

  「多殘酷？」

  講白一點就是，如果連做人的基本本分都守不好，連你自己都管不住，那就別說什麼學佛修行了。

  「哇，直接被打臉的感覺。」

  這就是大家常聽到的「人成即佛成」。如果你在家庭裡總是自私自利，在職場上充滿欺騙，你的心永遠都是浮躁的。那鉢油根本連端都端不起來。

  「沒錯，端正品格、守好本分、不傷害他人，才是抵禦一切名利誘惑的唯一基礎。」

  所以，要在滾滾紅塵中做自己真正的主人，得先從做一個堂堂正正的人開始。先把地基打穩了，才能在人際交往中護好心裡的那鉢油。

  「非常同意。今天真的聊得蠻深入的。下次，當大家面對利益衝突，準備跟家人或是親友激烈爭執的時候，不妨先停下來問問自己……」

  問問自己，為了贏得眼前的面子爭一口氣……

  「對，是不是正任由生命中那鉢清淨的油灑落一地呢？把這個問題留給大家去思考。我們今天的深度探討就到這邊，大家下次見囉。」

  大家下次見。