sutraId: samyukta-agama
number: 622
volume: 24
volumeTitle: 雜阿含經卷第二十四
title: 第622經・修攝心正智正念
gist: 佛陀藉菴羅女來訪之機，教導比丘應勤攝其心，安住於正智與正念中，並於受供後讚歎布施生天之果報。
originalText: |
  如是我聞：
  一時，佛在跋祇人間遊行，到鞞舍離國菴羅園中住。
  爾時，菴羅女聞世尊跋祇人間遊行至菴羅園中住，即自莊嚴乘車，出鞞舍離城，詣世尊所，恭敬供養。詣菴羅園門，下車步進，遙見世尊與諸大眾圍遶說法。

  世尊遙見菴羅女來，語諸比丘：「汝等比丘勤攝心住，正念正智。今菴羅女來，是故誡汝。云何為比丘勤攝心住？若比丘已生惡不善法當斷，生欲、方便，精進攝心。未生惡不善法不令起，未生善法令生，已生善法令住不忘，修習增滿，生欲、方便，精勤攝心，是名比丘勤攝心住。

  「云何名比丘正智？若比丘去來威儀常隨正智，迴顧視瞻，屈伸俯仰，執持衣鉢，行住坐臥，眠覺語默，皆隨正智住，是正智。

  「云何正念？若比丘內身身觀念住，精勤方便，正智正念，調伏世間貪憂。如是受、心、法法觀念住，精勤方便，正智正念，調伏世間貪憂，是名比丘正念。是故汝等勤攝其心，正智正念，今菴羅女來，是故誡汝。」

  時，菴羅女詣世尊所，稽首禮足，却住一面。
  爾時，世尊為菴羅女種種說法，示、教、照、喜；示、教、照、喜已，默然而住。
  爾時，菴羅女整衣服，為佛作禮，合掌白佛：「唯願世尊與諸大眾明日受我請中食。」
  爾時，世尊默然受請。菴羅女知世尊默然受請已，稽首禮足，還歸自家，設種種食，布置床座，晨朝遣使白佛：「時到。」

  爾時，世尊與諸大眾詣菴羅女舍，就座而坐。
  時，菴羅女手自供養種種飲食。食訖，澡漱、洗鉢竟。時，菴羅女持一小床坐於佛前，聽佛說法。

  爾時，世尊為菴羅女說隨喜偈：
  「施者人愛念，多眾所隨從，名稱日增高，遠近皆悉聞，
  處眾常和雅，離慳無所畏。是故智慧施，斷慳永無餘。
  上生忉利天，長夜受快樂，盡壽常修德，娛樂難陀園，
  百種諸天樂，五欲悅其心。彼於此人間，聞佛所說法，
  為善逝弟子，樂彼受化生。」

  爾時，世尊為菴羅女種種說法，示、教、照、喜；示、教、照、喜已，從座起而去。
detailedExplanation:
  - original: |
      如是我聞：
      一時，佛在跋祇人間遊行，到鞞舍離國菴羅園中住。
      爾時，菴羅女聞世尊跋祇人間遊行至菴羅園中住，即自莊嚴乘車，出鞞舍離城，詣世尊所，恭敬供養。詣菴羅園門，下車步進，遙見世尊與諸大眾圍遶說法。
    translation: |
      這是我親耳聽聞的：
      當時，佛陀在跋祇國的民間遊化，來到了鞞舍離國的菴羅園中居住。
      那時，菴羅女聽說世尊在跋祇國民間遊化並住在了菴羅園，便精心打扮自己，乘著馬車駛出鞞舍離城，前往世尊的所在之處，準備恭敬供養。她來到菴羅園門口，下車步行進入，遠遠看見世尊正被大眾圍繞著宣說佛法。
  - original: |
      世尊遙見菴羅女來，語諸比丘：「汝等比丘勤攝心住，正念正智。今菴羅女來，是故誡汝。云何為比丘勤攝心住？若比丘已生惡不善法當斷，生欲、方便，精進攝心。未生惡不善法不令起，未生善法令生，已生善法令住不忘，修習增滿，生欲、方便，精勤攝心，是名比丘勤攝心住。
    translation: |
      世尊遠遠看見菴羅女走來，便告訴隨行的比丘們，你們應當努力收攝心念安住，保持正確的覺知與清晰的了別智慧。因為現在菴羅女來了，所以我特別告誡你們。
      什麼是比丘努力收攝心念安住呢？如果比丘已經生起了罪惡不善的念頭，應當生起意願並運用方法，精進收攝心念來斷除它；尚未生起的罪惡不善念頭，絕不讓它生起；尚未生起的善念，要設法讓它生起；已經生起的善念，要讓它安住不忘失，並持續修習讓它增長圓滿，為此生起意願並運用方法，精進收攝心念。這就稱為比丘努力收攝心念安住。
  - original: |
      「云何名比丘正智？若比丘去來威儀常隨正智，迴顧視瞻，屈伸俯仰，執持衣鉢，行住坐臥，眠覺語默，皆隨正智住，是正智。
    translation: |
      什麼又叫做比丘清晰的了別智慧呢？如果比丘在來去走動的舉止中，時常伴隨著清晰的了別智慧，無論是轉頭看視、彎曲伸展、低頭仰首，還是拿著僧衣與食鉢，乃至行走、站立、坐著、躺臥、睡眠、醒來、說話或沉默時，都能安住於清晰的了別智慧中，這就叫做清晰的了別智慧。
  - original: |
      「云何正念？若比丘內身身觀念住，精勤方便，正智正念，調伏世間貪憂。如是受、心、法法觀念住，精勤方便，正智正念，調伏世間貪憂，是名比丘正念。是故汝等勤攝其心，正智正念，今菴羅女來，是故誡汝。」
    translation: |
      什麼是正確的覺知呢？如果比丘觀察自身而安住於正確的覺知，精進不懈地運用方法，保持清晰的了別智慧與正確的覺知，藉此降伏對世間的貪著與憂愁。同樣地，在觀察感受、觀察心念、觀察一切現象時而安住於正確的覺知，精進不懈地運用方法，保持清晰的了別智慧與正確的覺知，藉此降伏對世間的貪著與憂愁，這就稱為比丘正確的覺知。因此，你們應當努力收攝心念，保持清晰的了別智慧與正確的覺知，因為菴羅女正朝這裡走來，所以我才這樣告誡你們。
  - original: |
      時，菴羅女詣世尊所，稽首禮足，却住一面。
      爾時，世尊為菴羅女種種說法，示、教、照、喜；示、教、照、喜已，默然而住。
