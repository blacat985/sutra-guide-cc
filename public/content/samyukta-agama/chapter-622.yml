    translation: |
      隨後，菴羅女來到世尊面前，恭敬地叩頭頂禮佛足，然後退在一旁。
      當時，世尊為菴羅女開示了種種佛法，給予她開示、教導，使她明白法理並心生歡喜；作了這些開示與教導後，世尊便靜默下來。
      接著，菴羅女整理好自己的衣服，向佛陀行禮，雙手合十對佛陀說，希望世尊與隨行大眾明天能接受我的邀請，到我家享用午餐。
      世尊以沉默表示接受了邀請。菴羅女知道世尊已經默許後，便再次叩頭頂禮佛足，回到自己的家中，準備了各式各樣的食物，並布置好座位，到了隔天早晨便派人去向佛陀報告，用餐的時間已經到了。
  - original: |
      爾時，世尊與諸大眾詣菴羅女舍，就座而坐。
      時，菴羅女手自供養種種飲食。食訖，澡漱、洗鉢竟。時，菴羅女持一小床坐於佛前，聽佛說法。
    translation: |
      於是，世尊與隨行大眾來到了菴羅女的家中，並依序入座。
      當時，菴羅女親手將各種食物供養給佛陀與大眾。大家吃完飯，洗漱完畢並洗淨食鉢後，菴羅女便拿了一張小坐具坐在佛陀面前，聆聽佛陀說法。
  - original: |
      爾時，世尊為菴羅女說隨喜偈：
      「施者人愛念，多眾所隨從，名稱日增高，遠近皆悉聞，
      處眾常和雅，離慳無所畏。是故智慧施，斷慳永無餘。
      上生忉利天，長夜受快樂，盡壽常修德，娛樂難陀園，
      百種諸天樂，五欲悅其心。彼於此人間，聞佛所說法，
      為善逝弟子，樂彼受化生。」
    translation: |
      這時，世尊為菴羅女說了一首隨喜讚歎的偈語：
      樂於布施的人會受到他人的敬愛，會有許多群眾願意跟隨，他的名聲會日益高漲，無論遠近的人都會聽聞他的美名。
      他身處大眾之中總是溫和優雅，因為遠離了吝嗇而毫無畏懼。因此，帶著智慧去布施，能夠永遠斷除一切吝嗇。
      這樣的人死後會投生到忉利天，長久地享受快樂，他們終其一生不斷修養品德，能在天界的難陀園中自在娛樂，
      享受上百種天界的樂趣，美好的事物讓他們心生愉悅。
      這樣的人在這個人間聽聞了佛陀所說的教法，成為佛陀的弟子，也會樂於在天界接受佛法的教化而生活。
  - original: |
      爾時，世尊為菴羅女種種說法，示、教、照、喜；示、教、照、喜已，從座起而去。
    translation: |
      說完偈語後，世尊又為菴羅女開示了種種佛法，給予她開示、教導，使她明白法理並心生歡喜；作了這些開示與教導後，世尊便從座位起身離開了。
