sutraId: samyukta-agama
number: 636
volume: 24
volumeTitle: 雜阿含經卷第二十四
title: 第636-637經・出家持戒修念處
gist: 佛陀詳述修習四念處的完整次第，從聽法生信、捨棄世俗出家、嚴守戒律、守護感官、斷除五蓋，最終安住於四念處。
originalText: |
  （六三六）

  如是我聞：

  一時，佛住巴連弗邑鷄林精舍。

  爾時，世尊告諸比丘：「當為汝說修四念處。何等為修四念處？若比丘！如來、應、等正覺、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛世尊出興于世，演說正法，上語亦善，中語亦善，下語亦善，善義善味，純一滿淨，梵行顯示。若族姓子、族姓女從佛聞法，得淨信心。如是修學，見在家和合欲樂之過，煩惱結縛，樂居空閑，出家學道，不樂在家，處於非家，欲一向清淨，盡其形壽，純一滿淨，鮮白梵行：『我當剃除鬚髮，著袈裟衣，正信非家，出家學道。』

  作是思惟已，即便放捨錢財親屬，剃除鬚髮，著袈裟衣，正信非家，出家學道，正其身行，護口四過，正命清淨，習賢聖戒，守諸根門，護心正念。眼見色時，不取形相，若於眼根住不律儀，世間貪憂、惡不善法常漏於心，而今於眼起正律儀；耳、鼻、舌、身、意起正律儀，亦復如是。

  「彼以賢聖戒律成就，善攝根門，來往周旋，顧視屈伸，坐臥眠覺語默，住智正智。彼成就如此聖戒，守護根門，正智正念，寂靜遠離，空處、樹下、閑房獨坐，正身正念，繫心安住。斷世貪憂，離貪欲，淨除貪欲；斷世瞋恚、睡眠、掉悔、疑蓋，離瞋恚、睡眠、掉悔、疑蓋，淨除瞋恚、睡眠、掉悔、疑蓋。斷除五蓋——惱心、慧力羸、諸障閡分、不趣涅槃者，是故，內身身觀念住，精勤方便，正智正念，調伏世間貪憂；如是外身、內外身，受、心、法法觀念住，亦如是說。是名比丘修四念處。」

  佛說此經已，諸比丘聞佛所說，歡喜奉行。

  （六三七）

  如是我聞：

  一時，佛住舍衛國祇樹給孤獨園。

  爾時，世尊告諸比丘：「當修四念處……」如上廣說。差別者，乃至「如是出家已，住於靜處，攝受波羅提木叉律儀，行處具足，於細微罪生大怖畏，受持學戒，離殺、斷殺、不樂殺生，乃至一切業跡如前說，衣鉢隨身，如鳥兩翼。如是學戒成就，修四念處。」

  佛說此經已，諸比丘聞佛所說，歡喜奉行。
detailedExplanation:
  - original: |
      （六三六）

      如是我聞：
      一時，佛住巴連弗邑鷄林精舍。

      爾時，世尊告諸比丘：「當為汝說修四念處。何等為修四念處？若比丘！如來、應、等正覺、明行足、善逝、世間解、無上士、調御丈夫、天人師、佛世尊出興于世，演說正法，上語亦善，中語亦善，下語亦善，善義善味，純一滿淨，梵行顯示。
    translation: |
      這是我親耳聽聞的：

      當時，佛陀住在巴連弗邑的鷄林精舍。

      那時，世尊告訴比丘們：「我應當為你們解說如何修習四念處。什麼是修習四念處呢？比丘們！當具備如來、應供、正等正覺等十種德號的佛陀出現於世間，為大眾演說正法。這正法無論是初善、中善還是後善，都具備完美的義理與法味，能展現出純潔無瑕的清淨修行之道。
  - original: |
      若族姓子、族姓女從佛聞法，得淨信心。如是修學，見在家和合欲樂之過，煩惱結縛，樂居空閑，出家學道，不樂在家，處於非家，欲一向清淨，盡其形壽，純一滿淨，鮮白梵行：『我當剃除鬚髮，著袈裟衣，正信非家，出家學道。』
    translation: |
      如果有善男子或善女人從佛陀那裡聽聞了佛法，生起了清淨的信心。他們依照教法修學，看清了世俗家庭生活中追求感官享樂的過患，以及各種煩惱的束縛。因此，他們嚮往居住在空曠安靜的地方，決心出家修道，不再貪戀世俗生活。他們期盼走向完全的清淨，在有生之年實踐純潔無瑕的清淨行，心中這樣思惟：『我應當剃除鬚髮，穿上袈裟，帶著正確的信仰離開世俗的家，出家修學佛道。』

  - original: |
      作是思惟已，即便放捨錢財親屬，剃除鬚髮，著袈裟衣，正信非家，出家學道，正其身行，護口四過，正命清淨，習賢聖戒，守諸根門，護心正念。眼見色時，不取形相，若於眼根住不律儀，世間貪憂、惡不善法常漏於心，而今於眼起正律儀；耳、鼻、舌、身、意起正律儀，亦復如是。

      眼見色時，不取形相，若於眼根住不律儀，世間貪憂、惡不善法常漏於心，而今於眼起正律儀；耳、鼻、舌、身、意起正律儀，亦復如是。
    translation: |
      有了這樣的決心後，他們便放下財富與親屬，剃除鬚髮，穿上袈裟，帶著正信出家修道。他們端正自己的身體行為，防護口舌不犯妄語等四種過失，以清淨正當的方式維持生活，學習並遵守神聖的戒律。他們嚴格守護自己的感官之門，保護心靈並維持正念。
      
      當眼睛看見形色時，不去執著於事物的整體特徵或細部特相。因為如果不約束眼根，世間的貪欲、憂煩以及各種不善的念頭就會經常漏入心中；現在他們對眼根生起了正確的防護與約束。對於耳朵聽聲、鼻子嗅香、舌頭嚐味、身體觸碰、意念思惟，也都同樣生起正確的防護與約束。
  - original: |
      彼以賢聖戒律成就，善攝根門，來往周旋，顧視屈伸，坐臥眠覺語默，住智正智。
      
      彼成就如此聖戒，守護根門，正智正念，寂靜遠離，空處、樹下、閑房獨坐，正身正念，繫心安住。
      
      斷世貪憂，離貪欲，淨除貪欲；斷世瞋恚、睡眠、掉悔、疑蓋，離瞋恚、睡眠、掉悔、疑蓋，淨除瞋恚、睡眠、掉悔、疑蓋。
      
      斷除五蓋——惱心、慧力羸、諸障閡分、不趣涅槃者，是故，內身身觀念住，精勤方便，正智正念，調伏世間貪憂；
      
      如是外身、內外身，受、心、法法觀念住，亦如是說。是名比丘修四念處。」

      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      這位修行者因為具備了神聖的戒律，妥善守護了感官之門，於是在日常的往來走動、環顧四周、屈伸肢體，乃至行住坐臥、睡眠覺醒、說話沉默之中，都能保持清晰的覺察與正確的智慧。
      
      他成就了這樣的神聖戒律，守護感官，保持正智正念，接著便會走向寂靜的遠離之處，在空曠地、樹下或安靜的房間裡獨自靜坐。他端正身體，保持正念，將心念安住。
      
      他斷除了對世間的貪愛與憂煩，遠離並淨化了貪欲；同樣地，也斷除、遠離並淨化了瞋恚、睡眠、掉悔、疑慮等會障蔽心靈的負面狀態。
      
      徹底斷除這五種會干擾內心、削弱智慧、帶來障礙且無法通向涅槃的煩惱之蓋後，他便向內觀察身體，將心念安住其中，精進不懈，保持正確的智慧與正念，以此降伏世間的貪憂。
      
      如同觀察內在身體一樣，對外在身體、內外身體的綜合，以及感受、心念、一切現象，也都是這樣去觀察並將心念安住其中。這就是比丘修習四念處的完整過程。」

      佛陀解說完這部經後，比丘們聽聞佛陀的教導，都充滿歡喜，並遵照著去實行。
  - original: |
      （六三七）

      如是我聞：
      一時，佛住舍衛國祇樹給孤獨園。

      爾時，世尊告諸比丘：「當修四念處……」如上廣說。差別者，乃至「如是出家已，住於靜處，攝受波羅提木叉律儀，行處具足，於細微罪生大怖畏，受持學戒，離殺、斷殺、不樂殺生，乃至一切業跡如前說，衣鉢隨身，如鳥兩翼。如是學戒成就，修四念處。」

      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      這是我親耳聽聞的：

      當時，佛陀住在舍衛國的祇樹給孤獨園。

      佛陀告訴比丘們應當修習四念處，其修學的完整次第與前經所說大致相同。特別強調的差異在於：「像這樣出家之後，住在安靜的地方，應當嚴格守持波羅提木叉的核心戒律，行為舉止都符合規範，即使對極微小的過失也心存警惕與畏懼。應當受持種種學習規範與戒律，遠離殺生、斷除殺害的念頭、不樂於殺生，乃至各項行為都如前面所說般清淨。生活極其簡樸，只有衣鉢隨身攜帶，就像鳥兒飛行時只帶著兩隻翅膀一樣。像這樣成就清淨的戒律後，進一步去修習四念處。」

      佛陀解說完這部經後，比丘們聽聞佛陀的教導，都充滿歡喜，並遵照著去實行。
