number: 623
volume: 24
volumeTitle: 雜阿含經卷第二十四
title: 第623經・持滿油鉢修念處
gist: 佛陀以端持滿鉢之油且有拔刀者尾隨為喻，教導比丘應具備高度的生死危機感，專心一意修習四念處，不為世間聲色所惑。
originalText: |
  如是我聞：
  一時，佛住波羅奈仙人住處鹿野苑中。
  爾時，世尊告諸比丘：「世間言美色，世間美色者，能令多人集聚觀看者不？」
  諸比丘白佛：「如是，世尊！」
  佛告比丘：「若世間美色，世間美色者，又能種種歌舞伎樂，復極令多眾聚集看不？」
  比丘白佛：「如是，世尊！」

  佛告比丘：「若有世間美色，世間美色者，在於一處，作種種歌舞伎樂戲笑，復有大眾雲集一處，若有士夫不愚不癡，樂樂背苦，貪生畏死，有人語言：『士夫，汝當持滿油鉢，於世間美色者所及大眾中過，使一能殺人者，拔刀隨汝，若失一渧油者，輒當斬汝命。』云何？比丘！彼持油鉢士夫能不念油鉢，不念殺人者，觀彼伎女及大眾不？」

  比丘白佛：「不也，世尊！所以者何？世尊！彼士夫自見其後有拔刀者，常作是念：『我若落油一渧，彼拔刀者當截我頭。』唯一其心，繫念油鉢，於世間美色及大眾中徐步而過，不敢顧眄。」

  「如是，比丘！若有沙門、婆羅門正身自重，一其心念，不顧聲色，善攝一切心法，住身念處者，則是我弟子，隨我教者。云何為比丘正身自重，一其心念，不顧聲色，攝持一切心法，住身念處。如是，比丘！身身觀念，精勤方便，正智正念，調伏世間貪憂，受、心、法法觀念住亦復如是。是名比丘正身自重，一其心念，不顧聲色，善攝心法，住四念處。」

  爾時，世尊即說偈言：
  「專心正念，護持油鉢，自心隨護，未曾至方，
  甚難得過，勝妙微細，諸佛所說，言教利劍。
  當一其心，專精護持，非彼凡人，放逸之事，
  能入如是，不放逸教。」
  佛說此經已，諸比丘聞佛所說，歡喜奉行。
detailedExplanation:
  - original: |
      如是我聞：
      一時，佛住波羅奈仙人住處鹿野苑中。
      爾時，世尊告諸比丘：「世間言美色，世間美色者，能令多人集聚觀看者不？」
      諸比丘白佛：「如是，世尊！」
      佛告比丘：「若世間美色，世間美色者，又能種種歌舞伎樂，復極令多眾聚集看不？」
      比丘白佛：「如是，世尊！」
    translation: |
      是我親耳聽聞的：
      當時，佛陀住在波羅奈國仙人住處的鹿野苑中。
      當時，世尊告訴比丘們：「世間所說的美女，這些世間的美女，能不能讓很多人聚集過來觀看呢？」
      比丘們對佛陀說：「是的，世尊！」
      佛陀又告訴比丘們：「如果世間的美女，又能表演各種歌舞和音樂，是不是更能吸引大批群眾聚集觀看呢？」
      比丘們回答：「是的，世尊！」
  - original: |
      佛告比丘：「若有世間美色，世間美色者，在於一處，作種種歌舞伎樂戲笑，復有大眾雲集一處，若有士夫不愚不癡，樂樂背苦，貪生畏死，有人語言：『士夫，汝當持滿油鉢，於世間美色者所及大眾中過，使一能殺人者，拔刀隨汝，若失一渧油者，輒當斬汝命。』云何？比丘！彼持油鉢士夫能不念油鉢，不念殺人者，觀彼伎女及大眾不？」
    translation: |
      佛陀告訴比丘們：「如果有世間的美女聚集在一個地方，表演各種歌舞、音樂和戲耍，又有一大群人雲集在那裡。這時，如果有一個不愚笨、不痴傻，喜歡快樂、厭惡痛苦，貪戀生命、害怕死亡的男子。有人對他說：『你現在必須端著一個裝滿油的鉢，從這些世間美女和聚集的大眾中間穿過去。我會派一個劊子手拔出刀跟在你的身後，如果你灑出了一滴油，他立刻就會砍下你的頭。』比丘們，你們怎麼看？那個端著油鉢的人，能夠不專注於油鉢，不去想身後的劊子手，反而去觀看那些表演的伎女和群眾嗎？」
  - original: |
      比丘白佛：「不也，世尊！所以者何？世尊！彼士夫自見其後有拔刀者，常作是念：『我若落油一渧，彼拔刀者當截我頭。』唯一其心，繫念油鉢，於世間美色及大眾中徐步而過，不敢顧眄。」
    translation: |
      比丘們對佛陀說：「不會的，世尊！為什麼呢？世尊！那個人自己知道身後有拔刀跟隨的人，心裡一定會時常想著：『我如果灑落一滴油，那個拔刀的人就會砍下我的頭。』他只會專心一意，把心思完全綁在油鉢上，在世間美女和群眾之中緩慢步行而過，絕對不敢東張西望。」
  - original: |
      「如是，比丘！若有沙門、婆羅門正身自重，一其心念，不顧聲色，善攝一切心法，住身念處者，則是我弟子，隨我教者。云何為比丘正身自重，一其心念，不顧聲色，攝持一切心法，住身念處。如是，比丘！身身觀念，精勤方便，正智正念，調伏世間貪憂，受、心、法法觀念住亦復如是。是名比丘正身自重，一其心念，不顧聲色，善攝心法，住四念處。」
    translation: |
      佛陀說：「正是如此，比丘們！如果有修行者端正自身、自重自愛，專心一意，不去顧盼世間的聲音與美色，善於收攝一切心念，安住於觀察身體的法門中，這才是我的弟子，才是真正跟隨我教導的人。什麼是比丘端正自身、自重自愛，專心一意，不顧盼聲色，收攝一切心念而安住於觀察身體的法門呢？比丘們，就是觀察自身而安住於正確的覺知，精進不懈地運用方法，保持清晰的了別智慧與正確的覺知，藉此降伏對世間的貪著與憂愁。同樣地，在觀察感受、觀察心念、觀察一切現象時而安住於覺知，也是如此。這就稱為比丘端正自身、自重自愛，專心一意，不顧盼聲色，善於收攝心念，安住於四種覺知法門之中。」
  - original: |
      爾時，世尊即說偈言：
      「專心正念，護持油鉢，自心隨護，未曾至方，
      甚難得過，勝妙微細，諸佛所說，言教利劍。
      當一其心，專精護持，非彼凡人，放逸之事，
      能入如是，不放逸教。」
      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      這時，世尊便說了一首偈語：
      專心保持正確的覺知，就像護持裝滿油的鉢一樣。謹慎地守護自己的心念，才能前往那未曾到達的解脫境界。
      這個境界極難越過，殊勝奇妙且微細。諸佛所宣說的教導，如同斬斷煩惱的鋒利寶劍。
      應當專心一意，精進護持這份覺知。這絕非那些放縱懈怠的凡夫俗子所能做到的事，
      只有不放逸的人，才能契入這樣嚴謹不放逸的教法之中。
      佛陀說完這部經後，比丘們聽聞佛陀的教導，都心生歡喜，並遵照奉行。
