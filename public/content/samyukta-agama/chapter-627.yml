    translation: |
      這是我親耳聽聞的：
      當時，佛陀住在舍衛國的祇樹給孤獨園。

      那時，阿那律陀尊者來到佛陀的住處，恭敬地向佛陀頂禮，然後退坐到一旁，對佛陀說：「世尊！如果有比丘還處在需要學習的階段，尚未證得無上安穩的涅槃境界，但他正精進地尋求。這位聖弟子應當如何在正法與戒律中不斷修習，才能夠斷除所有的煩惱，甚至自己清楚知道不再受生於未來的輪迴之中呢？」

      佛陀告訴阿那律：「如果聖弟子還處在需要學習的階段，尚未證得無上安穩的涅槃境界，而正精進地尋求。他在這個時候，應當向內觀察身體，將心念安住於身體的實相中，精進不懈，保持正確的智慧與正念，以此降伏對世間的貪欲與憂煩。同樣地，對於感受、心念以及一切現象，也都要這樣去觀察並將心念安住其中，精進不懈，保持正確的智慧與正念，以此降伏對世間的貪欲與憂煩。像這樣，聖弟子經過不斷地修習之後，就能夠斷除所有的煩惱，甚至自己清楚知道不再受生於未來的輪迴之中。」

      這時，阿那律陀尊者聽聞佛陀的教導，內心充滿歡喜，隨順讚歎，向佛陀頂禮後便離去了。
