    translation: |
      這是我親耳聽聞的：
      當時，佛陀住在巴連弗邑的鷄林精舍。當時，優陀夷尊者與阿難尊者也都住在這座精舍裡。

      那時，優陀夷尊者來到阿難尊者的住處，兩人互相問候致意後，優陀夷退坐到一旁，對阿難尊者說：「如來以其無上的智慧與見地，為比丘們解說神聖的戒律，讓大家能守持得不中斷、不缺漏、不挑剔、不背離，也不執著於無益的禁戒，從而達到究竟完善的守持，這是受有智慧的人所讚歎且不嫌惡的。究竟是為了什麼原因，佛陀要為比丘們解說這樣神聖的戒律，讓大家守持得如此圓滿，乃至受到智者讚歎呢？」

      阿難尊者回答優陀夷：「是為了修習四念處的緣故。是哪四個呢？也就是向內觀察身體、感受、心念以及一切現象，並將心念安住於其中。」

      當時，這兩位賢者共同討論完畢後，便各自回到了自己的住處。
