audioTitle: "雜阿含經627-637：四念處拆解得失心（音頻導讀）"

transcript: |
  ### 一、日常中的得失心與古老智慧解藥

  「歡迎你來參與這次的深度探討。你有沒有覺得，我們每天在職場上或是處理人際關係的時候，總是被一種東西折磨得很慘，就是那個得失心。」

  沒錯，這個得失心真的是無處不在。

  「對啊，那其實解藥就藏在非常古老的智慧裡面。在《雜阿含經》還有虛雲老和尚的開示當中，其實提供了一套非常具體，而且是可以直接拿來解題的框架。」

  從宏觀來看，經典裡面講的這個四念處，絕對不只是一個高深莫測的修行名詞而已，它其實是一套非常精密的心理機制，可以幫你拆解日常的各種煩惱。

  ### 二、虛雲老和尚的見聞：光緒皇帝的得失

  「真的。那最有趣的地方來了，就是虛雲老和尚當年親眼看過光緒皇帝的一段故事。光緒皇帝在逃難的時候肚子餓，連吃一口平民百姓給的番薯藤，都覺得是人間美味，什麼皇帝的架子全沒了。」

  因為那時候保命最重要。

  「對，但是危機一過，他回到皇宮以後，只要稍微有一點點不順心，就氣得摔筷子吃不下飯。這個真的超像我們現在的職場生態。」

  怎麼說？

  「你看，這就像一間公司如果面臨重大的生存危機，快要倒閉了，所有部門的人都能放下成見，什麼層級、派系都不管了，大家攜手合作，只求活下去。」

  患難見真情的那種感覺。

  「沒錯，可是只要危機一解除，辦公室裡面的那種爭權奪利、得失心，立刻就原形畢露。為什麼我們人這麼容易故態復萌呢？」

  ### 三、拆解得失心：身念處與受念處的運作

  其實這個現象，精準展示了我們人心的運作機制。你想，皇帝逃難的時候，為了保命，他無意間契合了「身念處」。

  「身念處？」

  就是他把身體單純當成一個求生的載具。而且同時他也做到了「受念處」，等於是截斷了感受跟貪瞋之間的連結，反正只要能吃飽就好，沒有什麼好壞之分。

  「所以番薯藤也吃得很開心。」

  沒錯。但是回到順境之後，大腦又開始把這個身體當成了那個尊貴的「我」，就開始對各種順境，也就是佛學裡面說的「樂受」，產生無止盡的貪求。

  「哇，那我們來拆解一下。這聽起來非常有道理，但是實戰中其實超難的吧？」

  ### 四、四念處的實戰應用：從穩住身體到看透因緣

  確實不容易，但我們可以練習。我舉個最經典的生活例子好了。假設過年家庭聚會，長輩突然拿你跟其他親戚比較，當眾說：你怎麼薪水還是這麼點，職位都沒升啊？

  「這個聽了真的會生氣。」

  絕對是火氣立刻上來。當下你一定覺得受傷、沒面子。這種時候哪裡還有什麼理智去走四念處的步驟啊？其實這就是一個絕佳的實踐機會。當你火氣上來的那短短一瞬間，你要馬上啟動這四個步驟。第一步是「身念處」，你先不要急著回話，把注意力拉回身體。

  「像是去感覺身體哪裡不舒服嗎？」

  對，去覺察你現在是不是胸口很悶，或者是肩膀瞬間整個緊繃起來。這可以強制把你的注意力留在當下，不被情緒捲走。

  「先穩住身體。」

  然後第二步，「受念處」。你要在心裡面明確地標記，這是一個「苦受」，也就是不舒服的感覺。

  「等一下，為什麼要在心裡標記？這能改變什麼嗎？」

  這個很重要。因為當你在心裡給情緒貼上「苦受」的標籤時，你其實是在啟動大腦的理智中樞。這會強制切斷自動防禦機制，讓大腦停止編造受害者故事。

  「哦，就是不要再自己加戲了。」

  沒錯。接著我們進入第三步，「心念處」。你要往內看，看見這其實是一股比較心，或者是瞋心的狀態。你要意識到你不是那個憤怒，它就只是一個正在生滅的心理狀態而已。

  「那最後一步呢？」

  最後就是「法念處」。你要看透這背後的運作規則。其實得失心就等於貪求面子加上我執，再加上比較。這引出了一個重要的問題。

  「什麼問題？」

  就是讓你痛苦的根源，從來都不在長輩的那句冷言冷語，而是在於我們自己執取了那個面子，緊緊抓著那個「我應該被大家看得起」的念頭不放。

  「懂了。當我看見這個公式正在運作的時候，我等於是跳出了那個情境，站在旁邊看著自己的反應，而不是跟著那個情緒一起燒起來。」

  ### 五、以直視取代住相：不被情緒牽著走

  完全正確。所以這一切對你有什麼意義？就像那些古老智慧說的，四念處其實就像一把解剖刀，讓你醒過來，看清楚情緒底層到底是怎麼運作的。

  「這就是智慧的展現。」

  結合經文裡的智慧，是讓你能夠放得下，不去住相於那些感受。這不是要你變成一個毫無反應的冷血動物，而是看著情緒來來去去，但是你不會被它牽著鼻子走。

  「說得太好了。最後，我想留一個發人深省的思考給你。下次，當你跟伴侶或者是家人爭吵的時候，那個得失心發作的短短零點五秒內...」

  就是那個很想贏的瞬間。

  「能不能不要急著反擊，而是單純看著那個想贏的念頭升起，然後選擇不跟著它走。」

  這個挑戰非常有意思。你可以親自在生活中實驗看看，我們下次見。
