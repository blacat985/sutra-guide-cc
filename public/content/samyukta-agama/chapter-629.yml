  - original: |
      如是我聞：
      一時，佛住巴連弗邑鷄林精舍。爾時，尊者阿難、尊者跋陀羅亦在彼住。

      （六二九）
      時，尊者跋陀羅問尊者阿難言：「頗有法修習多修習，得不退轉耶？」

      （六三〇）
      時，尊者跋陀羅問尊者阿難：「頗有法修習多修習，令不淨眾生而得清淨，轉增光澤耶？」

      （六三一）
      時，尊者跋陀羅問尊者阿難：「頗有法修習多修習，能令未度彼岸眾生得度彼岸？」

      （六三二）
      時，尊者跋陀羅問尊者阿難：「頗有法修習多修習，得阿羅漢？」

      尊者阿難語尊者跋陀羅：「有法修習多修習，能令行者得不退轉，謂四念處。何等為四？身身觀念住，受、心、法法觀念住。」
      時，二正士共論說已，各還本處。

    translation: |
      這是我親耳聽聞的：
      當時，佛陀住在巴連弗邑的鷄林精舍。阿難尊者與跋陀羅尊者也都住在這座精舍裡。

      跋陀羅尊者連續向阿難尊者提問，探討是否有某種法門，只要常常修習，就能讓修行者達到特定的境界。
      
      阿難尊者對此皆給予了一致的回答：「有一種法門，常常修習就能達成，那就是四念處。也就是向內觀察身體、感受、心念以及一切現象，並將心念安住於其中。」

      關於跋陀羅尊者這四次提問的具體修行目標如下：

      * **第六二九經**：如何能令修行者得**不退轉**？
      * **第六三〇經**：如何能令身心不清淨的眾生**變得清淨，並煥發出光澤**？
      * **第六三一經**：如何能令尚未渡過生死苦海的眾生順利**得度彼岸**？
      * **第六三二經**：如何能證得究竟解脫的**阿羅漢果**？

      針對這些問題共同討論完畢後，這兩位賢者便各自回到了自己的住處。
