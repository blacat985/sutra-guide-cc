    translation: |
      （第六一八經）

      這是我親耳聽聞的：
      
      當時，佛陀在舍衛國的祇樹給孤獨園。
      
      那時，世尊告訴比丘們：「只要多多修習四念處，就能證得四種果位，獲得四種福利。是哪四種呢？也就是須陀洹果、斯陀含果、阿那含果、阿羅漢果。」
      
      佛陀說完這部經後，比丘們聽聞佛陀的教導，都歡喜地遵照奉行。
  - original: |
      （六一九）

      如是我聞：
      
      一時，佛在拘薩羅人間遊行，於私伽陀聚落北身恕林中。
      
      爾時，世尊告諸比丘：「過去世時有緣幢伎師，肩上竪幢，語弟子言：『汝等於幢上下向護我，我亦護汝，迭相護持，遊行嬉戲，多得財利。』
    translation: |
      （第六一九經）
      
      這是我親耳聽聞的：
      
      當時，佛陀在拘薩羅國的民間遊化，來到了私伽陀村落北邊的身恕林中。
      
      那時，世尊告訴比丘們：過去世時，有一位擅長爬竿特技的表演師傅，將長長的竹竿豎立在自己的肩膀上，對他的徒弟說：「你們在竹竿的上方和下方都要注意保護我，我也會保護你們，我們互相保護扶持，這樣到處巡迴表演，就能賺取許多錢財。」
  - original: |
      「時，伎弟子語伎師言：『不如所言，但當各各自愛護，遊行嬉戲，多得財利，身得無為安隱而下。』
    translation: |
      當時，徒弟對特技師傅說：「不如按照我所說的這樣，我們只需各自好好保護自己，這樣到處巡迴表演，就能賺取許多錢財，身體也能平安無事地從竿上下來。」
  - original: |
      「伎師答言：『如汝所言，各自愛護，然其此義亦如我說，己自護時即是護他，他自護時亦是護己；心自親近，修習隨護作證，是名自護護他。云何護他自護？不恐怖他、不違他、不害他，慈心哀彼，是名護他自護。』
      
      「是故，比丘！當如是學。自護者修四念處，護他者亦修四念處。」
      
      佛說此經已，諸比丘聞佛所說，歡喜奉行。
    translation: |
      特技師傅回答說：「就如你所說的，各自愛護自己。然而這個道理也等同於我所說的，當自己保護好自己時，也就是在保護他人；當他人保護好自己時，也就是在保護自己。內心時常安住於正法，修習覺察力來隨時保護自己並親證真理，這就叫做保護自己同時也保護他人。什麼叫做保護他人也就是保護自己呢？就是不去恐嚇他人、不違逆他人、不傷害他人，以慈悲心憐憫對方，這就叫做保護他人也就是保護自己。」
      
      所以，比丘們！你們應當這樣學習。想要保護自己的人要修習四念處，想要保護他人的人也要修習四念處。
      
      佛陀說完這部經後，比丘們聽聞佛陀的教導，都歡喜地遵照奉行。
